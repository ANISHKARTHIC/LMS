services:
  - type: web
    name: virtual-lab-evaluation-system
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py create_default_admin && gunicorn virtual_lab_eval.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: virtual-lab-db
          property: connectionString
      - key: AI_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_VISION_MODEL
        value: "gemini-2.0-flash"
      - key: GEMINI_TEXT_MODEL
        value: "gemini-2.0-flash"
      - key: GEMINI_FALLBACK_MODEL
        value: ""
      - key: GEMINI_MAX_RETRIES
        value: "4"
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"
      - key: DEFAULT_ADMIN_USERNAME
        value: "admin"
      - key: DEFAULT_ADMIN_EMAIL
        value: "admin@example.com"
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

databases:
  - name: virtual-lab-db
    databaseName: virtual_lab_db
    user: virtual_lab_user
    plan: free
